<style>
:root {
  --red:#D93025; --dark:#0F172A; --mid:#334155; --soft:#94A3B8;
  --bg:#F0F4F8; --white:#FFFFFF; --border:#E2E8F0;
  --green:#059669; --yellow:#D97706; --canceled:#7C3AED;
  --font-heading:'Noto Sans Thai', sans-serif;
  --font-body:'Sarabun', sans-serif;
  --font-mono:'DM Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--font-body);
  font-size:16px;
  line-height:1.6;
  background:var(--bg);
  color:var(--dark);
  min-height:100vh;
}

/* ── TOPBAR ── */
.topbar{background:var(--dark);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,0.3);}
.tb-left{display:flex;align-items:center;gap:14px;}
.tb-logo{height:28px;width:auto;display:block;filter:brightness(0) invert(1);}
.tb-divider{width:1px;height:20px;background:#334155;}
.tb-sub{font-size:11px;color:#64748B;font-family:var(--font-mono);letter-spacing:0.5px;}
.tb-nav{display:flex;gap:4px;}
.nav-btn{padding:5px 14px;border-radius:6px;border:1px solid #334155;background:transparent;color:#94A3B8;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:all .2s;white-space:nowrap;}
.nav-btn.active,.nav-btn:hover{background:#1E293B;color:#fff;border-color:#475569;}

/* ── LAYOUT ── */
.main{display:flex;min-height:calc(100vh - 58px);}

/* ── SIDEBAR ── */
.sidebar{width:210px;background:var(--dark);padding:16px 0;flex-shrink:0;position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto;}
.team-header{padding:10px 14px 4px;display:flex;align-items:center;gap:6px;}
.team-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.team-lbl{font-size:10px;font-weight:700;color:#64748B;text-transform:uppercase;font-family:var(--font-body);}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;transition:background .15s;border-left:3px solid transparent;}
.sb-item:hover{background:#1E293B;}
.sb-item.active{background:#1E293B;border-left-color:var(--red);}
.sb-avatar{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;flex-shrink:0;font-family:var(--font-mono);}
.sb-info{flex:1;min-width:0;}
.sb-name{font-size:13px;font-weight:600;color:#E2E8F0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--font-body);}
.sb-role{font-size:11px;color:#64748B;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--font-body);}
.sb-pct{font-size:11px;font-weight:700;font-family:var(--font-mono);}

/* ── CONTENT ── */
.content{flex:1;padding:22px;overflow-y:auto;}
.page-title{font-size:22px;font-weight:600;color:var(--dark);margin-bottom:4px;font-family:var(--font-heading);}
.page-sub{font-size:14px;color:var(--soft);margin-bottom:18px;font-family:var(--font-body);}

/* ── PERSON CARD ── */
.person-card{background:#fff;border-radius:16px;margin-bottom:18px;box-shadow:0 1px 8px rgba(0,0,0,0.07);overflow:hidden;animation:fadeUp .35s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.p-header{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--border);}
.p-avatar{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;font-family:var(--font-mono);}
.p-info{flex:1;}
.p-name{font-size:17px;font-weight:600;font-family:var(--font-heading);}
.p-meta{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;}
.tag{display:inline-flex;align-items:center;padding:2px 9px;border-radius:99px;font-size:12px;font-weight:600;font-family:var(--font-body);}
.p-prog{text-align:right;flex-shrink:0;}
.prog-pct{font-size:22px;font-weight:700;font-family:var(--font-mono);}
.prog-bar-bg{background:#E2E8F0;border-radius:99px;height:5px;width:84px;margin-top:4px;}
.prog-bar-fill{height:5px;border-radius:99px;transition:width .6s ease;}
.prog-kr{font-size:11px;color:#94A3B8;margin-top:2px;text-align:right;font-family:var(--font-mono);}

.obj-block{padding:11px 20px;border-bottom:1px solid var(--border);background:#FAFBFC;display:flex;gap:8px;align-items:flex-start;}
.obj-lbl{font-size:10px;font-weight:600;color:#94A3B8;text-transform:uppercase;margin-bottom:2px;font-family:var(--font-body);}
.obj-text{font-size:14px;font-weight:500;color:var(--mid);line-height:1.6;font-family:var(--font-body);}

/* ── KR TABLE ── */
.kr-table{width:100%;border-collapse:collapse;font-size:14px;}
.kr-table th{padding:8px 13px;text-align:left;color:#94A3B8;font-size:11px;font-weight:700;text-transform:uppercase;background:#F8FAFC;border-bottom:1px solid var(--border);white-space:nowrap;font-family:var(--font-body);}
.kr-table td{padding:10px 13px;border-bottom:1px solid #F1F5F9;vertical-align:middle;}
.kr-table tr:last-child td{border-bottom:none;}
.kr-table tbody tr:hover td{background:#F8FAFC;}
.kr-num{font-size:11px;font-weight:600;font-family:var(--font-mono);color:#CBD5E1;width:24px;}
.kr-text{font-weight:500;color:var(--dark);line-height:1.5;font-family:var(--font-body);}
.kr-sub{font-size:12px;color:#64748B;margin-top:3px;font-family:var(--font-body);}
.sel-input{width:100%;min-width:115px;border:1px solid #E2E8F0;border-radius:6px;padding:5px 8px;font-size:13px;font-family:var(--font-body);color:var(--dark);background:#F8FAFC;outline:none;transition:border-color .2s;}
.sel-input:focus{border-color:#3B82F6;background:#fff;}

/* ── MONTHLY ── */
.monthly{padding:12px 20px;border-top:1px solid var(--border);background:#FAFBFC;}
.monthly-title{font-size:14px;font-weight:500;color:#64748B;text-transform:uppercase;margin-bottom:8px;font-family:var(--font-body);}
.month-grid{display:flex;gap:5px;flex-wrap:wrap;}
.month-cell{flex:1;min-width:62px;background:#F1F5F9;border-radius:8px;padding:7px 5px;text-align:center;border:1px solid transparent;transition:all .2s;}
.month-cell:hover{border-color:#CBD5E1;background:#fff;}
.month-cell.cur{border-color:#3B82F6;background:#EFF6FF;}
.m-name{font-size:10px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:1px;font-family:var(--font-body);}
.m-sel{background:transparent;border:none;font-size:15px;cursor:pointer;outline:none;width:100%;text-align:center;margin-top:4px;}

/* ── OVERVIEW ── */
.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px;}
.ov-card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 1px 6px rgba(0,0,0,0.06);cursor:pointer;transition:transform .2s,box-shadow .2s;animation:fadeUp .4s ease both;}
.ov-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,0.1);}
.ov-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.ov-av{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;font-family:var(--font-mono);}
.ov-name{font-size:15px;font-weight:600;font-family:var(--font-heading);}
.ov-role{font-size:12px;color:#64748B;margin-top:1px;font-family:var(--font-body);}
.ov-pct{font-size:20px;font-weight:700;font-family:var(--font-mono);margin-left:auto;}
.ov-bar-bg{background:#E2E8F0;border-radius:99px;height:4px;margin-bottom:9px;}
.ov-bar-fill{height:4px;border-radius:99px;}
.ov-kr-list{display:flex;flex-direction:column;gap:4px;}
.ov-kr-item{display:flex;align-items:center;gap:6px;font-size:13px;color:#475569;font-family:var(--font-body);}
.ov-kr-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* ── SUMMARY PAGE ── */
.summary-page{}
.sum-top-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px;}
.sum-card{background:#fff;border-radius:12px;padding:14px;text-align:center;box-shadow:0 1px 5px rgba(0,0,0,0.06);}
.sum-val{font-size:28px;font-weight:700;font-family:var(--font-mono);}
.sum-lbl{font-size:13px;color:#64748B;margin-top:3px;font-family:var(--font-body);}

.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.chart-card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 1px 6px rgba(0,0,0,0.06);}
.chart-title{font-size:14px;font-weight:700;color:var(--mid);margin-bottom:14px;font-family:var(--font-heading);}
.donut-wrap{display:flex;align-items:center;gap:18px;justify-content:center;}
.donut-legend{display:flex;flex-direction:column;gap:8px;}
.leg-item{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--mid);font-family:var(--font-body);}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.leg-val{font-weight:700;font-family:var(--font-mono);margin-left:auto;padding-left:10px;}

.team-progress-list{display:flex;flex-direction:column;gap:12px;}
.tp-item{}
.tp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.tp-name{font-size:14px;font-weight:700;font-family:var(--font-body);}
.tp-pct{font-size:13px;font-weight:700;font-family:var(--font-mono);}
.tp-bar-bg{background:#E2E8F0;border-radius:99px;height:8px;}
.tp-bar-fill{height:8px;border-radius:99px;transition:width .6s ease;}

.plan-section{background:#fff;border-radius:14px;padding:18px;box-shadow:0 1px 6px rgba(0,0,0,0.06);margin-bottom:14px;}
.plan-title{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px;font-family:var(--font-heading);}
.plan-table{width:100%;border-collapse:collapse;font-size:14px;}
.plan-table th{padding:8px 13px;text-align:left;color:#94A3B8;font-size:14px;font-weight:700;text-transform:uppercase;background:#F8FAFC;border-bottom:1px solid var(--border);font-family:var(--font-body);}
.plan-table td{padding:10px 13px;border-bottom:1px solid #F1F5F9;vertical-align:middle;font-family:var(--font-body);}
.plan-table tr:last-child td{border-bottom:none;}
.plan-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:12px;font-weight:700;white-space:nowrap;font-family:var(--font-body);}

@media(max-width:700px){
  .charts-row{grid-template-columns:1fr;}
  .sidebar{display:none;}
}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:99px;}
</style>
</head>

  {team:"content-support", dept:"Content Writer & Support", type:"kpi", text:"ใช้ AI ยกระดับ Speed การทำงาน Content", period:"ม.ค.–มิ.ย. 2026", status:"in-progress"},
  {team:"content-support", dept:"Content Writer & Support", type:"kpi", text:"เข้ามามีส่วนร่วมในงาน Support มากขึ้น", period:"ม.ค.–มิ.ย. 2026", status:"in-progress"},
];

const STATUS_CFG = {
  done:          {label:"เสร็จสิ้น",        emoji:"✅", color:"#059669", bg:"#D1FAE5"},
  "in-progress": {label:"กำลังดำเนินการ",   emoji:"🔄", color:"#D97706", bg:"#FEF3C7"},
  pending:       {label:"ยังไม่เริ่ม",       emoji:"⏳", color:"#94A3B8", bg:"#F1F5F9"},
  canceled:      {label:"ยกเลิก",            emoji:"🚫", color:"#7C3AED", bg:"#F5F3FF"},
};

// ══════════════════════════════════
//  STATE
// ══════════════════════════════════
let currentView = "detail";
let selectedPerson = "faiz";
const monthData = {};
const actualData = {};
const krStatus = {};
PEOPLE.forEach(p => {
  monthData[p.id] = [...p.monthStatus];
  actualData[p.id] = p.krs.map(()=>"");
  krStatus[p.id] = p.krs.map(k=>k.status);
});
const planStatus = PLAN_ITEMS.map(i=>i.status);

// ══════════════════════════════════
//  HELPERS
// ══════════════════════════════════
const getTeam = id => TEAMS.find(t=>t.id===id);
const getPerson = id => PEOPLE.find(p=>p.id===id);
function getProgress(pid) {
  const s = krStatus[pid];
  const done = s.filter(x=>x==="done").length;
  return Math.round(done/s.length*100);
}
function statusColor(s){
  if(s==="done") return "#059669";
  if(s==="in-progress") return "#D97706";
  if(s==="canceled") return "#7C3AED";
  return "#94A3B8";
}

// ══════════════════════════════════
//  SIDEBAR
// ══════════════════════════════════
function renderSidebar() {
  let html = "";
  TEAMS.forEach(team => {
    const members = PEOPLE.filter(p=>p.team===team.id);
    if(!members.length) return;
    html += `<div class="team-header"><div class="team-dot" style="background:${team.color}"></div><span class="team-lbl">${team.name}</span></div>`;
    members.forEach(p => {
      const pct = getProgress(p.id);
      const c = pct===100?"#059669":pct>0?"#D97706":"#94A3B8";
      html += `<div class="sb-item ${p.id===selectedPerson&&currentView==="detail"?"active":""}" onclick="selectPerson('${p.id}')">
        <div class="sb-avatar" style="background:${team.color}">${p.initials}</div>
        <div class="sb-info"><div class="sb-name">${p.name.split(" ")[0]}</div><div class="sb-role">${p.role}</div></div>
        <span class="sb-pct" style="color:${c}">${pct}%</span>
      </div>`;
    });
  });
  document.getElementById("sidebar").innerHTML = html;
}

// ══════════════════════════════════
//  DETAIL VIEW
// ══════════════════════════════════
function renderDetail(pid) {
  const p = getPerson(pid);
  const team = getTeam(p.team);
  const pct = getProgress(pid);

  const krsHTML = p.krs.map((kr,i)=>{
    const opts = Object.entries(STATUS_CFG).map(([v,c])=>
      `<option value="${v}" ${krStatus[pid][i]===v?"selected":""}>${c.emoji} ${c.label}</option>`).join("");
    return `<tr>
      <td class="kr-num">KR${i+1}</td>
      <td><div class="kr-text">${kr.text}</div><div class="kr-sub">📏 วัดจาก: ${kr.kpi} &nbsp;|&nbsp; 🎯 เป้าหมาย: ${kr.target}</div></td>
      <td><select class="sel-input" style="max-width:140px" onchange="changeStatus('${pid}',${i},this.value)">${opts}</select></td>
      <td><input class="sel-input" type="text" placeholder="กรอกผลจริง..." value="${actualData[pid][i]}" oninput="saveActual('${pid}',${i},this.value)"></td>
    </tr>`;
  }).join("");

  const monthHTML = MONTHS.map((m,i)=>{
    const st = monthData[pid][i];
    const opts = Object.entries(STATUS_CFG).map(([v,c])=>`<option value="${v}" ${st===v?"selected":""}>${c.emoji}</option>`).join("");
    return `<div class="month-cell ${i===CUR_M?"cur":""}">
      <div class="m-name">${m}</div>
      <select class="m-sel" onchange="changeMonth('${pid}',${i},this.value)">${opts}</select>
    </div>`;
  }).join("");

  document.getElementById("content").innerHTML = `
    <div class="page-title">OKR รายบุคคล</div>
    <div class="page-sub">ครึ่งปีแรก 2026</div>
    <div class="person-card">
      <div class="p-header">
        <div class="p-avatar" style="background:${team.color}">${p.initials}</div>
        <div class="p-info">
          <div class="p-name">${p.name}</div>
          <div class="p-meta">
            <span class="tag" style="background:${team.bg};color:${team.color}">${team.name}</span>
            <span class="tag" style="background:#F1F5F9;color:#475569">${p.role}</span>
          </div>
        </div>
        <div class="p-prog">
          <div class="prog-pct" style="color:${pct===100?"#059669":pct>50?"#D97706":"#64748B"}">${pct}%</div>
          <div class="prog-bar-bg"><div class="prog-bar-fill" id="prog-fill-${pid}" style="width:${pct}%;background:${team.color}"></div></div>
          <div class="prog-kr" id="prog-kr-${pid}">${krStatus[pid].filter(s=>s==="done").length}/${p.krs.length} KR</div>
        </div>
      </div>
      <div class="obj-block">
        <span style="font-size:14px;margin-top:1px">🎯</span>
        <div><div class="obj-lbl">Objective</div><div class="obj-text">${p.obj}</div></div>
      </div>
      <table class="kr-table">
        <thead><tr><th>#</th><th>Key Result + KPI</th><th>สถานะ</th><th>ผลจริง / หมายเหตุ</th></tr></thead>
        <tbody>${krsHTML}</tbody>
      </table>
      <div class="monthly">
        <div class="monthly-title">📅 ติดตามรายเดือน — คลิก emoji เพื่ออัปเดต</div>
        <div class="month-grid">${monthHTML}</div>
      </div>
    </div>`;
}

// ══════════════════════════════════
//  OVERVIEW
// ══════════════════════════════════
function renderOverview() {
  let html = `<div class="page-title">ภาพรวม OKR ทีม</div><div class="page-sub">ครึ่งปีแรก 2026 &nbsp;•&nbsp; คลิกเพื่อดูรายละเอียด</div><div class="ov-grid">`;
  PEOPLE.forEach((p,idx)=>{
    const team = getTeam(p.team);
    const pct = getProgress(p.id);
    const krList = p.krs.map((kr,i)=>{
      const c = statusColor(krStatus[p.id][i]);
      return `<div class="ov-kr-item"><div class="ov-kr-dot" style="background:${c}"></div><span>${kr.text.substring(0,40)}${kr.text.length>40?"…":""}</span></div>`;
    }).join("");
    html += `<div class="ov-card" style="animation-delay:${idx*.06}s" onclick="selectPerson('${p.id}')">
      <div class="ov-top">
        <div class="ov-av" style="background:${team.color}">${p.initials}</div>
        <div><div class="ov-name">${p.name}</div><div class="ov-role">${p.role}</div></div>
        <div class="ov-pct" style="color:${pct===100?"#059669":pct>0?"#D97706":"#94A3B8"}">${pct}%</div>
      </div>
      <div class="ov-bar-bg"><div class="ov-bar-fill" style="width:${pct}%;background:${team.color}"></div></div>
      <div class="ov-kr-list">${krList}</div>
    </div>`;
  });
  html += "</div>";
  document.getElementById("content").innerHTML = html;
}

// ══════════════════════════════════
//  SUMMARY PAGE
// ══════════════════════════════════
function renderSummary() {
  // Counts
  const total = planStatus.length;
  const done = planStatus.filter(s=>s==="done").length;
  const ip = planStatus.filter(s=>s==="in-progress").length;
  const pend = planStatus.filter(s=>s==="pending").length;
  const canc = planStatus.filter(s=>s==="canceled").length;
  const pct = Math.round(done/total*100);

  // Team breakdown
  const teamDepts = [
    {key:"marketing",       label:"Marketing & Content", color:"#D97706"},
    {key:"dev",             label:"Programming & Dev",   color:"#2563EB"},
    {key:"seo",             label:"SEO / Design",        color:"#7C3AED"},
    {key:"content-support", label:"Content & Support",   color:"#6B7280"},
  ];

  const teamStats = teamDepts.map(td=>{
    const idxs = PLAN_ITEMS.map((it,i)=>it.team===td.key?i:-1).filter(i=>i>=0);
    const t = idxs.length;
    const d = idxs.filter(i=>planStatus[i]==="done").length;
    return {...td, total:t, done:d, pct: t>0?Math.round(d/t*100):0};
  });

  // Donut SVG
  const donutR = 54, cx = 70, cy = 70, circ = 2*Math.PI*donutR;
  const segments = [
    {val:done,  color:"#059669"},
    {val:ip,    color:"#D97706"},
    {val:pend,  color:"#CBD5E1"},
    {val:canc,  color:"#7C3AED"},
  ];
  let offset = 0;
  let svgPaths = segments.map(seg=>{
    const len = (seg.val/total)*circ;
    const path = `<circle cx="${cx}" cy="${cy}" r="${donutR}" fill="none" stroke="${seg.color}" stroke-width="14"
      stroke-dasharray="${len} ${circ-len}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset += len;
    return path;
  }).join("");

  // Plan items by team
  const planByTeam = teamDepts.map(td=>{
    const items = PLAN_ITEMS.map((it,i)=>({...it,idx:i})).filter(it=>it.team===td.key);
    return {...td, items};
  });

  let planTablesHTML = planByTeam.map(td=>{
    if(!td.items.length) return "";
    const rows = td.items.map(it=>{
      const s = STATUS_CFG[planStatus[it.idx]];
      const typeTag = it.type==="kpi"
        ?`<span class="plan-badge" style="background:#EFF6FF;color:#3B82F6">📊 KPI</span>`
        :`<span class="plan-badge" style="background:#F0FDF4;color:#16A34A">🏁 Milestone</span>`;
      const statusOpts = Object.entries(STATUS_CFG).map(([v,c])=>
        `<option value="${v}" ${planStatus[it.idx]===v?"selected":""}>${c.emoji} ${c.label}</option>`).join("");
      return `<tr>
        <td>${typeTag}</td>
        <td style="font-weight:500;color:#1E293B;font-size:12px">${it.text}</td>
        <td style="font-size:11px;color:#64748B;white-space:nowrap">${it.period}</td>
        <td><select class="sel-input" style="max-width:150px" onchange="changePlanStatus(${it.idx},this.value)">${statusOpts}</select></td>
      </tr>`;
    }).join("");
    return `<div class="plan-section">
      <div class="plan-title">
        <div style="width:10px;height:10px;border-radius:50%;background:${td.color};flex-shrink:0"></div>
        ${td.label}
      </div>
      <table class="plan-table">
        <thead><tr><th>ประเภท</th><th>แผนงาน</th><th>ช่วงเวลา</th><th>สถานะ</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }).join("");

  const teamBarsHTML = teamStats.map(ts=>`
    <div class="tp-item">
      <div class="tp-header">
        <span class="tp-name" style="color:${ts.color}">${ts.label}</span>
        <span class="tp-pct" style="color:${ts.color}">${ts.pct}%</span>
      </div>
      <div class="tp-bar-bg"><div class="tp-bar-fill" style="width:${ts.pct}%;background:${ts.color}"></div></div>
    </div>`).join("");

  document.getElementById("content").innerHTML = `
    <div class="page-title">📊 สรุปแผนงานครึ่งปีแรก</div>
    <div class="page-sub">ครึ่งปีแรก 2026 — มกราคม ถึง มิถุนายน 2026</div>

    <div class="sum-top-cards">
      <div class="sum-card"><div class="sum-val" style="color:#3B82F6">${total}</div><div class="sum-lbl">แผนงานทั้งหมด</div></div>
      <div class="sum-card"><div class="sum-val" style="color:#059669">${done}</div><div class="sum-lbl">✅ เสร็จสิ้น</div></div>
      <div class="sum-card"><div class="sum-val" style="color:#D97706">${ip}</div><div class="sum-lbl">🔄 กำลังดำเนินการ</div></div>
      <div class="sum-card"><div class="sum-val" style="color:#94A3B8">${pend}</div><div class="sum-lbl">⏳ ยังไม่เริ่ม</div></div>
      <div class="sum-card"><div class="sum-val" style="color:#7C3AED">${canc}</div><div class="sum-lbl">🚫 ยกเลิก</div></div>
    </div>

    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">ภาพรวมความคืบหน้าทั้งบริษัท</div>
        <div class="donut-wrap">
          <svg width="140" height="140" viewBox="0 0 140 140">
            <circle cx="70" cy="70" r="54" fill="none" stroke="#F1F5F9" stroke-width="14"/>
            ${svgPaths}
            <text x="70" y="66" text-anchor="middle" font-size="20" font-weight="700" fill="#1E293B" font-family="DM Mono, monospace">${pct}%</text>
            <text x="70" y="82" text-anchor="middle" font-size="10" fill="#94A3B8" font-family="Noto Sans Thai, sans-serif">ความคืบหน้า</text>
          </svg>
          <div class="donut-legend">
            ${[
              {label:"เสร็จสิ้น",val:done,color:"#059669"},
              {label:"กำลังดำเนินการ",val:ip,color:"#D97706"},
              {label:"ยังไม่เริ่ม",val:pend,color:"#CBD5E1"},
              {label:"ยกเลิก",val:canc,color:"#7C3AED"},
            ].map(l=>`<div class="leg-item">
              <div class="leg-dot" style="background:${l.color}"></div>
              <span>${l.label}</span>
              <span class="leg-val" style="color:${l.color}">${l.val}</span>
            </div>`).join("")}
          </div>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">ความคืบหน้าแยกตามทีม</div>
        <div class="team-progress-list">${teamBarsHTML}</div>
      </div>
    </div>

    ${planTablesHTML}`;
}

// ══════════════════════════════════
//  INTERACTIONS
// ══════════════════════════════════
function selectPerson(pid) {
  selectedPerson = pid;
  currentView = "detail";
  document.querySelectorAll(".nav-btn").forEach((b,i)=>b.classList.toggle("active",i===1));
  renderSidebar();
  renderDetail(pid);
}

function setView(v, btn) {
  currentView = v;
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  if(v==="detail") renderDetail(selectedPerson);
  else if(v==="overview") renderOverview();
  else renderSummary();
  renderSidebar();
}

function changeStatus(pid, idx, val) {
  krStatus[pid][idx] = val;
  renderSidebar();
  const pct = getProgress(pid);
  const pctEl = document.querySelector(".prog-pct");
  if(pctEl) { pctEl.textContent=pct+"%"; pctEl.style.color=pct===100?"#059669":pct>50?"#D97706":"#64748B"; }
  const fillEl = document.getElementById(`prog-fill-${pid}`);
  if(fillEl) fillEl.style.width=pct+"%";
  const krEl = document.getElementById(`prog-kr-${pid}`);
  if(krEl) krEl.textContent=`${krStatus[pid].filter(s=>s==="done").length}/${getPerson(pid).krs.length} KR`;
}

function saveActual(pid, idx, val) { actualData[pid][idx]=val; }
function changeMonth(pid, mi, val) { monthData[pid][mi]=val; }
function changePlanStatus(idx, val) {
  planStatus[idx]=val;
  renderSummary();
}

// ══════════════════════════════════
//  INIT
// ══════════════════════════════════
renderSidebar();
renderSummary();
</script>
</body>
</html>
